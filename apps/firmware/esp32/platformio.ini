; PlatformIO Project Configuration for NRTF ESP32 firmware
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev

[env]
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_ldf_mode = deep+
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DASYNC_TCP_RUNNING_CORE=1

lib_deps =
    knolleary/PubSubClient@^2.8           ; MQTT
    bblanchon/ArduinoJson@^7.1.0          ; JSON
    adafruit/Adafruit INA219@^1.2.3        ; current/voltage sensor
    adafruit/Adafruit ADS1X15@^2.5.0       ; high-precision ADC
    adafruit/DHT sensor library@^1.4.6     ; T/RH
    adafruit/Adafruit BusIO@^1.16.1
    paulstoffregen/OneWire@^2.3.8          ; DS18B20
    milesburton/DallasTemperature@^4.0.4   ; DS18B20
    adafruit/Adafruit BH1750@^1.3.0        ; lux
    adafruit/Adafruit MAX31855 library@^1.4.2  ; thermocouple (also covers MAX6675 patterns)
    plerup/EspSoftwareSerial@^8.2.0
    me-no-dev/AsyncTCP@^1.1.1              ; for AsyncWebServer if needed
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    eloquentarduino/EloquentTinyML@^2.4.4  ; TinyML inference (TFLite Micro)

[env:esp32dev]
platform = espressif32@^6.9.0
board = esp32dev
board_build.filesystem = spiffs

[env:esp32-c3]
platform = espressif32@^6.9.0
board = esp32-c3-devkitc-02

[env:esp32-cam]
platform = espressif32@^6.9.0
board = esp32cam
build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
