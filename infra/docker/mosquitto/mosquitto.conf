# Mosquitto config for NRTF (hackathon-friendly)
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Standard MQTT
listener 1883
protocol mqtt

# WebSocket MQTT (for browser clients via mqtt.js)
listener 9001
protocol websockets

# Hackathon convenience: anonymous allowed for local dev only.
# Switch to password_file before any external exposure.
allow_anonymous true
# password_file /mosquitto/config/passwd
