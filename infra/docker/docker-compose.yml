name: nrtf

services:
  # ─── Infrastructure ───────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: nrtf-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nrtf
      POSTGRES_PASSWORD: nrtf
      POSTGRES_DB: nrtf
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nrtf"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nrtf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: nrtf-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # ─── Application ──────────────────────────────────────────────

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    container_name: nrtf-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    env_file:
      - ../../.env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_TOPIC: nrtf/sensors/+/telemetry

  frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:3000
        NEXT_PUBLIC_BACKEND_WS_URL: http://localhost:3000
    container_name: nrtf-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - backend
    env_file:
      - ../../.env.docker
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3000
      NEXT_PUBLIC_BACKEND_WS_URL: http://localhost:3000

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
