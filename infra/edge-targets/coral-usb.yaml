target_id: coral-usb
hardware:
  type: USB accelerator (host-attached)
  npu: Edge TPU @ 4 TOPS INT8
  ram_mb: 8                  # internal SRAM
  host: x86 / ARM via USB 3.0
  accelerators: [edge-tpu]
constraints:
  model_size_mb_max: 8       # on-chip SRAM; larger spills via USB → slow
  latency_p95_ms: 25
  fps_min: 30
  power_w_max: 2.5
runtimes_supported:
  - libcoral
  - pycoral
  - tflite-edgetpu
quant_schemes_supported:
  - int8-full-integer        # ONLY scheme — QAT preferred over PTQ
notes: |
  Compile with `edgetpu_compiler` v16+. The compiler reports per-op coverage —
  if any op falls back to CPU, the latency target is missed.
  Best for MobileNetV3, EfficientDet-Lite, MnasNet. YOLOv8n requires careful op rewriting.
  Stretch hardware — order from Mouser only if budget allows.
