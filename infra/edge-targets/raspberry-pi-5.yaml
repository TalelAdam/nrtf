target_id: raspberry-pi-5
hardware:
  cpu: ARM Cortex-A76 quad-core @ 2.4 GHz
  ram_gb: 8
  storage: SD or NVMe via PCIe HAT
  accelerators: []           # V3D GPU exists but not useful for ML
constraints:
  flash_mb: null             # effectively unbounded
  ram_max_mb: 6500           # reserve ~1.5 GB for OS + dashboard
  latency_p95_ms: 80         # for vision tasks
  llm_tokens_per_sec_min: 7  # Phi-3-mini-Q4_K_M floor
  power_w_max: 12
  fps_min: 10
runtimes_supported:
  - onnxruntime
  - tflite
  - llama.cpp
  - opencv
  - tensorrt              # NO — no NVIDIA GPU
quant_schemes_supported:
  - int8-static
  - int8-dynamic
  - fp16
  - gguf-q4km
  - gguf-q5km
  - gguf-q8_0
notes: |
  Set CPU governor to 'performance'. Active cooling REQUIRED — passive throttles at 80°C.
  Swap on USB-SSD or NVMe; never on SD card.
  Build llama.cpp with -march=armv8.4-a+dotprod and OPENBLAS=1.
  Expected: YOLOv8n FP16 ~ 70 ms, INT8 ~ 35 ms; Phi-3-mini-Q4_K_M ~ 8-10 tok/s.
