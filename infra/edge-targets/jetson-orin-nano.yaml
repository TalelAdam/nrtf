target_id: jetson-orin-nano
hardware:
  cpu: ARM Cortex-A78AE 6-core @ 1.5 GHz
  gpu: 1024-core Ampere @ 624 MHz, 32 Tensor Cores
  nvdla: 2x NVIDIA DLA
  ram_gb: 8
  storage: SD / NVMe via M.2
  accelerators: [cuda, tensorrt, nvdla]
constraints:
  ram_max_mb: 6500
  latency_p95_ms: 25
  fps_min: 30
  power_w_max: 15            # MAXN mode; 7W mode for thermal-constrained runs
runtimes_supported:
  - tensorrt
  - onnxruntime              # CUDA EP
  - tensorrt-llm
  - llama.cpp                # CUDA backend
quant_schemes_supported:
  - fp16                     # default — Tensor Cores happy
  - int8-static              # via TensorRT calibration
  - gguf-q4km                # for Phi-3-medium etc.
notes: |
  Stretch target — only acquire if pitch budget allows.
  JetPack 6.x required. Use TensorRT 8.6+ for ONNX-to-engine.
  trtexec is the benchmark; treat its numbers as ground truth.
  If used, runs the AURA Vision teacher (YOLOv8m / RT-DETR-L) live for the demo.
