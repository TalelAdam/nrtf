target_id: esp32-cam
hardware:
  cpu: Xtensa LX6 dual-core @ 240 MHz (no SIMD)
  flash_mb: 4
  sram_kb: 520
  psram_mb: 4
  camera: OV2640 (max 1600x1200, JPEG)
  accelerators: []
constraints:
  flash_mb_max: 3
  tensor_arena_kb_max: 180
  latency_p95_ms: 400
  fps_min: 2
  power_w_max: 0.5
runtimes_supported:
  - tflite-micro
quant_schemes_supported:
  - int8-full-integer
notes: |
  Older LX6 core — no ESP-NN SIMD. Inference is 3-5× slower than ESP32-S3.
  For demo, prefer ESP32-S3 + external camera if available.
  Camera framebuffer in PSRAM mandatory. Set CAMERA_FB_IN_PSRAM in sdkconfig.
  Watch: WiFi + camera streaming + inference all together → frequent brownouts under USB power. Use external 5V/2A.
